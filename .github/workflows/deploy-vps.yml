name: Deploy VPS

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script_stop: true
          script: |
            export APP_DIR="${{ secrets.VPS_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then APP_DIR="/opt/playground"; fi
            export PUBLIC_URL="${{ secrets.PUBLIC_URL }}"
            if [ -z "$PUBLIC_URL" ]; then PUBLIC_URL="https://netailab.com"; fi
            cd "$APP_DIR"
            bash scripts/deploy-vps-update.sh
